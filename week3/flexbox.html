<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px 80px;
        }

        div.Header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        div.logo {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        div.menu_container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        div.buttonrequest {
            border-radius: 3px;
            border: black solid 2px;
            padding: 8px 20px;
        }

        p {
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="Header">
        <div class="logo">
            <img src="images/Icon.svg" alt="Positivus Logo" width="25" />
            <h2>Positivus</h2>
        </div>
        <div class="menu_container">
            <div class="aboutus">About us</div>
            <div class="services">Services</div>
            <div class="usecases">Uses Cases</div>
            <div class="pricing">Pricing</div>
            <div class="blog">Blog</div>
            <div class="buttonrequest">Request a Quote</div>
        </div>
    </div>

    <div class="title">
        <div class="navigation"></div>
        <h1>Navigation the <br>digital landscape<br> for success</h1>
        <p>Our digital marketing agency helps businesses<br>grow and succeed online through a range of<br>services
            including
            SED,PPC,social media marketing, and content creation.</p>
    </div>




</body>

</html>
