<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px 90px;
        }

        div.Header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            padding: 5px 10px;
        }

        div.logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        div.menu_container {
            display: flex;
            align-items: center;
            gap: 60px;
            font-size: 15px;
        }

        div.buttonrequest {
            border-radius: 10px;
            border: black solid 1px;
            padding: 13px 30px;
            font-size: 12px;
        }

        h1 {
            font-size: 60px;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
        }

        button.bookconsultation {
            color: white;
            background-color: black;
            border-radius: 10px;
            padding: 13px 30px;
        }

        div.title {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            align-items: center;
        }

        div.navigation {
            width: 50%;
        }

        div.speaker {
            width: 50%;
        }

        div.logo_bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 5px 20px;
        }

        div.logoname {
            filter: grayscale(1);
        }
    </style>
</head>

<body>
    <div class="Header">
        <div class="logo">
            <img src="images/Icon.svg" alt="Positivus Logo" width="25" />
            <h2>Positivus</h2>
        </div>
        <div class="menu_container">
            <div class="aboutus">About us</div>
            <div class="services">Services</div>
            <div class="usecases">Uses Cases</div>
            <div class="pricing">Pricing</div>
            <div class="blog">Blog</div>
            <div class="buttonrequest">Request a quote</div>
        </div>
    </div>

    <div class="title">
        <div class="navigation">
            <h1>Navigation the <br>digital landscape<br> for success</h1>
            <p>Our digital marketing agency helps businesses<br>grow and succeed online through a range of<br>services
                including SED,PPC,social media marketing,<br> and content creation.</p>
            <p>
                <button class="bookconsultation">Book a consultation</button>
            </p>
        </div>
        <div class="speaker"><img src="images/Illustration.png" alt="Image speaker" width="100%" /></div>
    </div>

    <div class="logo_bar">
        <div class="logoname"><img src="images/Company logo.png" alt="amazon" width="100%" /></div>
        <div class="logoname"><img src="images/Company logo (1).png" alt="dribbble" width="100%" /></div>
        <div class="logoname"><img src="images/Company logo (2).png" alt="hubspot" width="100%" /></div>
        <div class="logoname"><img src="images/Company logo (3).png" alt="notion" width="100%" /></div>
        <div class="logoname"><img src="images/Company logo (4).png" alt="netflix" width="100%" /></div>
        <div class="logoname"><img src="images/Company logo (5).png" alt="zoom" width="100%" /></div>
    </div>





</body>

</html>
