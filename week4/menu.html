<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week4 Exercise1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');

        body {
            font-family: 'Oxygen', sans-serif;
            margin: 4px 90px;
        }

        div.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            padding: 5px 10px;
        }

        div.logo {
            display: flex;
            align-items: center;
        }

        div.menu_container {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 15px;
        }

        div.phoneicon {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        div.phonenum {
            font-size: 15px;
            font-weight: bold;
        }

        div.buttoncontact {
            color: white;
            background-color: #ef7244;
            font-weight: bold;
            border-radius: 10px;
            padding: 13px 18px;
            font-size: 12px;
        }

        div.services {
            color: #ef7244;
        }

        div.hamburgermenu {
            display: none;
        }

        @media screen and (max-width: 1060px) {
            div.menu_container {
                display: none;
            }

            div.buttoncontact {
                display: none;
            }

            div.hamburgermenu {
                display: block;
            }
        }

        @media screen and (max-width: 570px) {
            div.phonenum {
                display: none;
            }

            div.phoneimg {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="images/elementra logo.png" alt="Elementra" width="190px">
        </div>
        <div class="menu_container">
            <div class="home">Home</div>
            <div class="services">Services</div>
            <div class="work">Work</div>
            <div class="projectdetails">Project Details</div>
            <div class="contact">Contact</div>
        </div>
        <div class="phoneicon">
            <div class="phoneimg"><img src="images/phone_icon_transparent.png" alt="phoneicon" width="30px"></div>
            <div class="phonenum">555-123-4567</div>
            <div class="buttoncontact">Contact</div>
            <div class="hamburgermenu"><img src="images/menu.png" alt="hamburger menu" width="30px"></div>
        </div>


    </div>
</body>

</html>
