<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 4px 90px;
        }

        div.Header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            padding: 5px 10px;
        }

        div.logo {
            display: flex;
            align-items: center;
        }

        div.menu_container {
            display: flex;
            align-items: center;
            gap: 30px;
            font-size: 15px;
        }

        div.phoneicon {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        div.buttoncontact {
            color: white;
            background-color: #ef7244;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            padding: 13px 30px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="Header">
        <div class="logo">
            <img src="images/elementra logo.png" alt="Elementra" width="40%">
        </div>
        <div class="menu_container">
            <div class="home">Home</div>
            <div class="services">Services</div>
            <div class="work">Work</div>
            <div class="projectdetails">Project Details</div>
            <div class="contact">Contact</div>
        </div>
        <div class="phoneicon">
            <img src="images/phone_icon_transparent.png" alt="phoneicon" width="30px">
            <h6>555-123-4567</h6>
            <div class="buttoncontact">Contact</div>
        </div>
    </div>
</body>

</html>
